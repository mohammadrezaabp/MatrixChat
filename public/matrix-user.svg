<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050805"/>
      <stop offset="100%" stop-color="#0f1a0f"/>
    </linearGradient>

    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#202020"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="42" fill="url(#bg)"/>

  <!-- Matrix rain -->
  <g opacity="0.12" stroke="#00ff66" stroke-width="2">
    <line x1="70" y1="0" x2="70" y2="512"/>
    <line x1="130" y1="0" x2="130" y2="512"/>
    <line x1="190" y1="0" x2="190" y2="512"/>
    <line x1="250" y1="0" x2="250" y2="512"/>
    <line x1="310" y1="0" x2="310" y2="512"/>
    <line x1="370" y1="0" x2="370" y2="512"/>
    <line x1="430" y1="0" x2="430" y2="512"/>
  </g>

  <!-- Neck -->
  <rect x="228" y="245" width="56" height="55" rx="18" fill="#d3b39c"/>

  <!-- Head -->
  <ellipse cx="256" cy="175" rx="84" ry="98" fill="#d8b89f"/>

  <!-- Hair -->
  <path d="
    M172 175
    C175 80, 337 80, 340 175
    C320 125, 292 110, 256 110
    C220 110, 192 125, 172 175
    Z"
    fill="#111111"/>

  <!-- Side hair -->
  <path d="M175 180 C178 250, 205 285, 225 295 L205 210 Z" fill="#111"/>
  <path d="M337 180 C334 250, 307 285, 287 295 L307 210 Z" fill="#111"/>

  <!-- Sunglasses -->
  <g filter="url(#greenGlow)">
    <ellipse cx="220" cy="185" rx="36" ry="18"
             fill="#050505" stroke="#00ff66" stroke-width="2"/>
    <ellipse cx="292" cy="185" rx="36" ry="18"
             fill="#050505" stroke="#00ff66" stroke-width="2"/>
    <rect x="244" y="181" width="24" height="5" rx="2" fill="#00ff66"/>
  </g>

  <!-- Nose -->
  <path d="M256 198 L247 230 L265 230 Z" fill="#caa892"/>

  <!-- Mouth -->
  <path d="M230 258 Q256 270 282 258"
        fill="none"
        stroke="#5b4135"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- Coat -->
  <path d="
    M145 512
    L185 305
    L327 305
    L367 512
    Z"
    fill="url(#coat)"/>

  <!-- Inner shirt -->
  <rect x="230" y="305" width="52" height="120" rx="10" fill="#0d0d0d"/>

  <!-- High collar -->
  <path d="
    M205 300
    Q256 250 307 300
    L290 330
    Q256 295 222 330
    Z"
    fill="#151515"/>

  <!-- Subtle green outline -->
  <rect x="10" y="10" width="492" height="492" rx="34"
        fill="none"
        stroke="#00ff66"
        stroke-width="3"
        opacity="0.3"/>
</svg>
