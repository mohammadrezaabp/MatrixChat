services:
  ollama:
    image: ollama/ollama:latest
    container_name: matrix-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=60m
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: matrix-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=matrixchat
      - POSTGRES_PASSWORD=matrixchat
      - POSTGRES_DB=matrixchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrixchat"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matrix-backend
    entrypoint: ["bash", "/app/entrypoint.sh"]
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_API_URL=http://ollama:11434
      - CHAT_MODEL_NAME=llama3.2:1b
      - SQL_MODEL_NAME=qwen2.5-coder:7b-instruct-q4_K_M
      - OLLAMA_KEEP_ALIVE=60m
      - CHAT_NUM_CTX=2048
      - SQL_NUM_CTX=4096
      - SQL_WARMUP_NUM_CTX=2048
      - SQL_TEMPERATURE=0.1
      - PULL_MODELS=false
      - LOCAL_ONLY=true
      - DATABASE_URL=postgresql://matrixchat:matrixchat@postgres:5432/matrixchat
      - AUTH_SECRET=change-this-secret-in-production
      - SESSION_TTL_SECONDS=604800
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
