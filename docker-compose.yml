services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matrix-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: matrix-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=matrixchat
      - POSTGRES_PASSWORD=matrixchat
      - POSTGRES_DB=matrixchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrixchat"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: matrix-ollama
    ports:
      - "11434:11434"
    # Requires Docker Desktop GPU support + NVIDIA drivers (Windows: WSL2 backend).
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_FLASH_ATTENTION=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matrix-backend
    entrypoint: ["bash", "/app/entrypoint.sh"]
    ports:
      - "8000:8000"
    environment:
      - AI_SERVICE_BASE_URL=https://gpu1-llm.emofid.com/
      - AI_SERVICE_API_KEY=sk-hUEEod0Jx1BhPwpaD209693b175c40689945122e6321Ff84
      - AI_SERVICE_MODEL=DeepSeek-V4-Pro
      - AI_SERVICE_COMPLETIONS_PATH=v1/chat/completions
      - AI_SERVICE_MAX_RETRIES=3
      - AI_SERVICE_INITIAL_RETRY_DELAY_SECONDS=2
      - AI_SERVICE_TIMEOUT_SECONDS=120
      - CHAT_MODEL_NAME=DeepSeek-V4-Pro
      - SQL_MODEL_NAME=DeepSeek-V4-Pro
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_SQL_MODEL=qwen2.5-coder:7b-instruct-q4_K_M
      - OLLAMA_NUM_GPU=-1
      - OLLAMA_WARMUP_ON_STARTUP=true
      - OLLAMA_SQL_NUM_CTX=2048
      - OLLAMA_SQL_NUM_PREDICT=256
      - OLLAMA_SQL_NUM_BATCH=256
      - OLLAMA_KEEP_ALIVE=30m
      - SQL_INTENT_USE_OLLAMA_CLASSIFIER=true
      - SQL_INTENT_CLASSIFIER_ENABLED=false
      - OLLAMA_MAX_RETRIES=1
      - OLLAMA_INITIAL_RETRY_DELAY_SECONDS=0.5
      - OLLAMA_TIMEOUT_SECONDS=120
      - OLLAMA_SCHEMA_SUMMARY_MAX_CHARS=2200
      - OLLAMA_SCHEMA_FAQ_MAX_CHARS=1200
      - LOCAL_ONLY=true
      - DATABASE_URL=postgresql://matrixchat:matrixchat@postgres:5432/matrixchat
      - AUTH_SECRET=change-this-secret-in-production
      - SESSION_TTL_SECONDS=604800
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
