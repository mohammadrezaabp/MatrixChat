version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: matrix-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matrix-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_API_URL=http://ollama:11434
      - MODEL_NAME=llama3.2
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
