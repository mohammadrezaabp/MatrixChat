services:
  ollama:
    image: ollama/ollama:latest
    container_name: matrix-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=60m
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matrix-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_API_URL=http://ollama:11434
      - CHAT_MODEL_NAME=llama3.2:1b
      - SQL_MODEL_NAME=qwen2.5-coder:1.5b
      - OLLAMA_KEEP_ALIVE=60m
      - CHAT_NUM_CTX=2048
      - SQL_NUM_CTX=1536
      - PULL_MODELS=false
      - LOCAL_ONLY=true
    depends_on:
      - ollama
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  ollama_data:
